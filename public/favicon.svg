<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 1. Background Gradient (The sky) -->
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>

    <!-- 2. The "Frosted Glass" Filter -->
    <filter id="glassBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" />
    </filter>

    <!-- 3. Subtle Glow/Shadow for depth -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
    
    <!-- 4. Glass Shine effect -->
    <linearGradient id="glassShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.5" />
      <stop offset="50%" style="stop-color:white;stop-opacity:0" />
      <stop offset="100%" style="stop-color:white;stop-opacity:0.2" />
    </linearGradient>
  </defs>

  <!-- Background Circle (The App Icon Shape) -->
  <circle cx="100" cy="100" r="100" fill="url(#skyGradient)" />

  <!-- The Sun (Visible through the glass) -->
  <circle cx="130" cy="70" r="30" fill="#ffce56" />

  <!-- THE GLASS PANEL (The main glassmorphism element) -->
  <!-- This is a semi-transparent white shape with a blur filter applied -->
  <rect x="30" y="30" width="140" height="140" rx="30" 
        fill="white" fill-opacity="0.2" 
        filter="url(#glassBlur)" 
        stroke="white" stroke-width="1" stroke-opacity="0.4" />
  
  <!-- The "Shine" layer on top of the glass -->
  <rect x="30" y="30" width="140" height="140" rx="30" 
        fill="url(#glassShine)" 
        pointer-events="none" />

  <!-- The Cloud (Placed on top of the glass for a 3D look) -->
  <g filter="url(#dropShadow)">
    <path d="M60,110 Q60,90 80,90 Q85,75 105,75 Q130,75 130,100 Q130,120 110,120 L70,120 Q60,120 60,110" 
          fill="white" fill-opacity="0.9" />
  </g>
</svg>
